# Portal Scanner Configuration — Jai Potnuri
# Target: Senior AI Engineer / LLM Engineer, US market
# Last audited: 2026-04-08
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery)
#
# REMOVED (non-US or dead URLs):
#   Cognigy, Aleph Alpha, Faculty, Travelperk, Qonto, Forto, Vinted,
#   Tinybird, Clarity AI, GetYourGuide, HelloFresh, N26, Trade Republic,
#   SumUp, Helsing, Speechmatics, PhysicsX, Wayve, Scandit, Cradle,
#   Ada (dead board), Temporal (0 jobs), Factorial (dead board)

# ---------------------------------------------------------------------------
# Title filter
# At least 1 positive must match AND 0 negatives must match (case-insensitive)
# ---------------------------------------------------------------------------

title_filter:
  positive:
    - "AI Engineer"
    - "LLM Engineer"
    - "ML Engineer"
    - "Machine Learning Engineer"
    - "Applied AI Engineer"
    - "GenAI Engineer"
    - "Generative AI Engineer"
    - "AI Software Engineer"
    - "LLMOps"
    - "MLOps"
    - "RAG"
    - "Agentic"
    - "AI Agent"
    - "Foundation Model"
    - "Applied ML"
    - "AI Platform"
    - "AI Infrastructure"
    - "AI Solutions Engineer"
    - "Forward Deployed"
  negative:
    - "Junior"
    - "Intern"
    - "Data Analyst"
    - "Data Scientist"
    - "Research Scientist"
    - "Manager"
    - "Director"
    - "VP "
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "SAP "
    - "COBOL"
    - "Mainframe"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head of"

# ---------------------------------------------------------------------------
# Location filter — US-only
# Jobs must match at least one "required" term OR have no location listed.
# Jobs matching any "exclude" term are skipped.
# ---------------------------------------------------------------------------

location_filter:
  required:
    - "United States"
    - "USA"
    - " US"
    - "Remote"
    - "US Remote"
    - "Remote US"
    - "Anywhere"
    - "San Francisco"
    - "New York"
    - "Seattle"
    - "Austin"
    - "Boston"
    - "Chicago"
    - "Los Angeles"
    - "Denver"
    - "Atlanta"
    - "Raleigh"
  exclude:
    - "Canada only"
    - "UK only"
    - "Europe only"
    - "Germany"
    - "France"
    - "Netherlands"
    - "Australia"
    - "India"
    - "Brazil"
    - "LATAM"
    - "EMEA only"
    - "APAC"

# ---------------------------------------------------------------------------
# Search queries — broad discovery across job boards
# ---------------------------------------------------------------------------

search_queries:
  - name: Ashby — AI Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Applied AI" US OR remote'
    enabled: true

  - name: Ashby — Agentic & MLOps
    query: 'site:jobs.ashbyhq.com "Agentic" OR "LLMOps" OR "MLOps" OR "AI Agent" senior'
    enabled: true

  - name: Greenhouse — AI Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "LLM Engineer" OR "Applied ML" remote OR "United States"'
    enabled: true

  - name: Greenhouse — Forward Deployed & Platform
    query: 'site:job-boards.greenhouse.io "Forward Deployed" OR "AI Platform" OR "AI Infrastructure" engineer'
    enabled: true

  - name: Lever — AI Engineer
    query: 'site:jobs.lever.co "AI Engineer" OR "LLM Engineer" OR "MLOps" OR "Agentic" remote OR US'
    enabled: true

  - name: Wellfound — AI Engineer
    query: 'site:wellfound.com "AI Engineer" OR "LLM Engineer" OR "ML Engineer" remote senior'
    enabled: true

  - name: LinkedIn — AI Engineer US
    query: 'site:linkedin.com/jobs "AI Engineer" OR "LLM Engineer" OR "Applied AI Engineer" "United States" senior'
    enabled: true

  - name: FDE — All portals
    query: '"Forward Deployed Engineer" OR "Deployed Engineer" AI site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

  - name: Voice AI — Engineer roles
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "Voice AI" OR "Speech AI" "AI Engineer" OR "ML Engineer" US OR remote'
    enabled: true

